name: Build and Sysdig Scans

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: 676928793871.dkr.ecr.us-west-2.amazonaws.com
  ECR_REPO: k-images

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [vote, worker, result]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:${{ matrix.app }}-${{ github.sha }} ./${{ matrix.app }}

      - name: Scan image with Sysdig
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ matrix.app }}-${{ github.sha }}
          sysdig-secure-token: ${{ secrets.SECURE_API_TOKEN }}
          sysdig-secure-url: https://app.us4.sysdig.com
          stop-on-failed-policy-eval: false
          stop-on-processing-error: false

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:${{ matrix.app }}-${{ github.sha }}

  iac-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sysdig IaC Scan
        uses: sysdiglabs/scan-action@v6
        with:
          sysdig-secure-token: ${{ secrets.SECURE_API_TOKEN }}
          sysdig-secure-url: https://app.us4.sysdig.com
          mode: iac
          iac-scan-path: ./k8s-specifications
          severity-at-least: high
